name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]

jobs:
  secrets-check:
    name: Ensure no plaintext K8s Secrets in repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Fail if a raw Secret with stringData/data is committed
        run: |
          # Look for any file in k8s/ that is kind: Secret (not SealedSecret).
          # SealedSecrets have kind: SealedSecret — those are fine.
          FOUND=$(grep -rl '^kind: Secret$' k8s/ 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Plaintext Kubernetes Secret found in:"
            echo "$FOUND"
            echo ""
            echo "Use Sealed Secrets instead (see k8s/05-sealed-secret.yaml)."
            echo "Run:  make seal   then delete the plain file."
            exit 1
          fi
          echo "OK: No plaintext Secrets found in k8s/"
 
      - name: Validate SealedSecret manifest is present and well-formed
        run: |
          if [ ! -f k8s/05-sealed-secret.yaml ]; then
            echo "ERROR: k8s/05-sealed-secret.yaml is missing."
            echo "       Run 'make seal' to generate it."
            exit 1
          fi
          KIND=$(grep '^kind:' k8s/05-sealed-secret.yaml | awk '{print $2}')
          if [ "$KIND" != "SealedSecret" ]; then
            echo "ERROR: k8s/05-sealed-secret.yaml has kind=$KIND, expected SealedSecret"
            exit 1
          fi
          echo "OK: SealedSecret manifest looks good (kind=$KIND)"

  build-and-push:
    needs: secrets-check
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.modified, 'k8s/') &&
      !contains(toJson(github.event.head_commit.modified), '.md')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-backend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-backend:{0}', github.sha) }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-frontend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-frontend:{0}', github.sha) }}
